<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的姓名 - 个人简历</title>
    <style>
        /* 在这里添加你的CSS样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>你的姓名</h1>
    <h2>个人简历</h2>

    <div class="section">
        <h3>个人信息</h3>
        <p>姓名：你的姓名</p>
        <p>电话：你的电话号码</p>
        <p>邮箱：你的邮箱地址</p>
    </div>

    <div class="section">
        <h3>教育背景</h3>
        <p>学校名称：学校名称</p>
        <p>学历：学历</p>
        <p>专业：专业</p>
        <p>毕业时间：毕业时间</p>
    </div>

    <div class="section">
        <h3>工作经验</h3>
        <p>公司名称：公司名称</p>
        <p>职位：职位</p>
        <p>工作时间：工作时间</p>
        <p>工作内容：工作内容</p>
    </div>

    <div class="section">
        <h3>技能</h3>
        <ul>
            <li>技能一</li>
            <li>技能二</li>
            <li>技能三</li>
        </ul>
    </div>
</body>
</html>
