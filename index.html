<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邱峰 - 个人简历</title>
    <style>
        /* 整体样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        /* 图片样式 */
        img {
            max-width: 100%; /* 图片宽度不超过容器宽度 */
            height: auto;  /* 自动调整高度，保持原有比例 */
        }

        /* 响应式设计示例 */
        @media (max-width: 768px) {
            /* 在屏幕宽度小于768px时，进一步调整图片大小 */
            img {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>邱峰</h1>
        <h2>个人简历</h2>

    </header>

        </section>

</body>
</html>
